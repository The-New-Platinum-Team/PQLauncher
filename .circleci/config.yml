# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/2.0/configuration-reference
version: 2.1
orbs:
    win: circleci/windows@4.1.1 # The Windows orb give you everything you need to start using the Windows executor.
    macos: circleci/macos@2.5.1

# Define a job to be invoked later in a workflow.
# See: https://circleci.com/docs/2.0/configuration-reference/#jobs
jobs:
  build:
    macos:
      xcode: 26.2.0 # Specify the Xcode version to use
    resource_class: m4pro.medium
    environment:
      HOMEBREW_NO_AUTO_UPDATE: 1
      NPROC: 4
      COMMIT_TAG: pipeline.git.tag
    steps:
      - add_ssh_keys:
          fingerprints:
            - "82:42:56:a0:57:43:95:4e:00:c0:8c:c1:7f:70:74:47"
      - checkout:
          path: ~/PQLauncher

      - macos/install-rosetta
      - run:
          name: Install brew dependencies
          command: |
            brew update
            brew install dotnet --force-bottle

      - run:
          name: Compile
          command: |
            cd ~/PQLauncher
            chmod +x macbuild.sh
            ./macbuild.sh
            zip -r PQLauncher.zip mac-dist/

      - run:
          name: Package
          command: |
             npm install -g create-dmg
             cd ~/PQLauncher/mac-dist
             xattr -rc PQLauncher.app
             xattr -dr com.apple.quarantine PQLauncher.app
             codesign --deep -fs - "PQLauncher.app"
             create-dmg --dmg-title="PlatinumQuest" PQLauncher.app || true

      - store_artifacts:
          path:  ~/PQLauncher/mac-dist/PlatinumQuest Launcher 1.0.dmg 
  build-linux:
      docker:
          - image: cimg/base:stable
      steps:
          - checkout:
                path: ~/PQLauncher
          - run:
                name: Install .NET SDK 8.0
                command: |
                    set -euxo pipefail
                    curl -sSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
                    chmod +x dotnet-install.sh
                    ./dotnet-install.sh --channel 8.0
                    echo 'export DOTNET_ROOT="$HOME/.dotnet"' >> "$BASH_ENV"
                    echo 'export PATH="$DOTNET_ROOT:$DOTNET_ROOT/tools:$PATH"' >> "$BASH_ENV"
          - run:
                name: Compile Linux
                command: |
                    cd ~/PQLauncher
                    chmod +x linuxbuild.sh
                    ./linuxbuild.sh
          - store_artifacts:
                path: ~/PQLauncher/linux-dist/PQLauncher-linux-x64.tar.gz

  build-windows:
      executor: win/default
      steps:
          - checkout:
                path: C:\Users\circleci\project
          - run:
                name: Install .NET SDK 8.0
                shell: powershell.exe
                command: |
                    choco install dotnet-8.0-sdk -y --no-progress
          - run:
                name: Compile Windows
                shell: powershell.exe
                command: |
                    cd C:\Users\circleci\project
                    powershell -ExecutionPolicy Bypass -File .\winbuild.ps1
          - store_artifacts:
                path: C:\Users\circleci\project\win-dist\PQLauncher-windows-x64.zip

workflows:
    build-mac:
        jobs:
            - build:
                  filters:
                      tags:
                          only: /^\d+.\d+.\d+$/
            - build-linux:
                  filters:
                      tags:
                          only: /^\d+.\d+.\d+$/
            - build-windows:
                  filters:
                      tags:
                          only: /^\d+.\d+.\d+$/
